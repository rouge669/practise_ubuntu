<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment form</title>
</head>

<body>
    <!-- action is wsed to declare a server-->
    <form action="">
        <h1>Payment Form</h1>
        <p>Required Fields are followed by *</p>
        <fieldset>
            <legend>Contact Information</legend>
            <!--- -->
            <p>Name: *<input type="text" name="name" required></p>
            <p>Age: <input type="number" name="age" disabled></p>
            <!--- """required""" keyword is used to declare a value/field mandatory in forms-->
            <!--- """disabled""" keyword is used to disable any input from any particular entity-->
            <fieldset>
                <!--field set is used to group similar elements -->
                <legend>Gender</legend>
                <!--This tag is used to declare a name for the grouped elements-->
                <p> Male <input type="radio" name="gender" id="male">Female <input type="radio" name="gender"
                        id="female">Other<input type="radio" name="gender" id="other"></p>
            </fieldset>
            <p>Address: <textarea name="address" id="address" cols="100" rows="10"></textarea></p>
            <p>Email: <input type="email" name="email" id="email"></p>
            <p>Pincode: <input type="number" name="pincode" id="pincode"></p>
            <h2>Payment Information</h2>
            <p>Card Type:
                <select name="card_type" id="card_type">
                    <option value="">---Select a Card Type---</option>
                    <option value="visa">Visa</option>
                    <option value="rupay">Rupay</option>
                    <option value="slice">slice</option>
                </select>
            </p>
            <p>Card Number <input type="number" name="Card_number" id="card_number"></p>
            <p>Expiration Date: <input type="date" name="" id="exp_date"></p>
            <p>CVV <input type="password" name="cvv" id="cvv"></p>
        </fieldset>

        <input type="submit" value="Pay Now">
    </form>
</body>

</html>
